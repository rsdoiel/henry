notes: >
  Qwen 3 4B Instruct, July 2025 checkpoint (2507), at Q5_K_S quantization.
  General-purpose instruct model; smaller footprint than the 7B Coder but
  more capable than the Qwen 3.5 4B for general reasoning tasks.
  Verify the hf_repo and gguf_file before building — if Qwen has not published
  an official GGUF repo for the 2507 checkpoint, try:
    hf repos search Qwen3-4B-Instruct-2507 --model
  and substitute the correct repo (e.g. bartowski/Qwen3-4B-Instruct-2507-GGUF).
  Runs well on M1 Mac Mini. On Pi 500 (CPU-only) expect ~2–4 tok/s.
